openapi: "3.0.3"
info:
  title: Genet Open API
  description: |
    Genet OpenAPI for Pod, Service, ConfigMap, and Job operations.
    - All resources use simplified JSON request/response models.
    - Effective namespace is always derived from the API key bound `ownerUser`.
    - Server injects ownership and management labels automatically.
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Local dev

security:
  - BearerAuth: []

paths:
  /api/open/pods:
    post:
      summary: Create Pod
      description: |
        Create a Pod using JSON request fields consistent with the web UI "Create Pod" form.
        The effective namespace is derived from API key bound `ownerUser` (user-{identifier}).
      operationId: createPod
      tags: [Pods]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIPodCreateRequest"
            example:
              image: "nvidia/cuda:12.0.0-base-ubuntu22.04"
              gpuType: "NVIDIA A100"
              gpuCount: 1
              cpu: "8"
              memory: "32Gi"
              shmSize: "1Gi"
              nodeName: "gpu-node-01"
              gpuDevices: [0]
              name: "train"
              userMounts:
                - hostPath: "/mnt/datasets"
                  mountPath: "/workspace/datasets"
                  readOnly: true
      responses:
        "201":
          description: Pod created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIPodCreateResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Conflict (for example active commit job or name conflict)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      summary: List Pods
      description: List Pods for API key bound `ownerUser`.
      operationId: listPods
      tags: [Pods]
      responses:
        "200":
          description: Pod list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIPodList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/open/pods/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Pod ID (same as Pod name)

    get:
      summary: Get Pod
      operationId: getPod
      tags: [Pods]
      responses:
        "200":
          description: Pod details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIPod"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      summary: Update Pod
      description: |
        Update Pod using JSON payload (same fields as create).
        Current behavior is **recreate**: delete old pod, then create a new pod with request fields.
        If `name` is omitted, server tries to infer custom suffix from path `id` and reuse it.
      operationId: updatePod
      tags: [Pods]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIPodUpdateRequest"
      responses:
        "201":
          description: Pod recreated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIPodCreateResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict (for example active commit job)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      summary: Delete Pod
      operationId: deletePod
      tags: [Pods]
      responses:
        "200":
          description: Pod deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/open/services:
    post:
      summary: Create Service
      description: |
        Create a Service for the API key bound `ownerUser`.
        Namespace and system labels are assigned by the server.
      operationId: createService
      tags: [Services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIServiceRequest"
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIServiceResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Target pod not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      summary: List Services
      description: List Services for current owner user.
      operationId: listServices
      tags: [Services]
      parameters:
        - name: labelSelector
          in: query
          description: Additional K8s label selector; owner filters are always appended by server.
          schema:
            type: string
      responses:
        "200":
          description: Service list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIServiceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/open/services/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Service name

    get:
      summary: Get Service
      operationId: getService
      tags: [Services]
      responses:
        "200":
          description: Service details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIServiceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      summary: Update Service
      description: |
        Update an existing Service in place.
        Namespace and system labels remain server-managed.
      operationId: updateService
      tags: [Services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIServiceRequest"
      responses:
        "200":
          description: Service updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIServiceResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Immutable field conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      summary: Delete Service
      operationId: deleteService
      tags: [Services]
      responses:
        "200":
          description: Service deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/open/configmaps:
    post:
      summary: Create ConfigMap
      description: |
        Create a ConfigMap for the API key bound `ownerUser`.
        Namespace and system labels are assigned by the server.
      operationId: createConfigMap
      tags: [ConfigMaps]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIConfigMapRequest"
      responses:
        "201":
          description: ConfigMap created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIConfigMapDetail"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      summary: List ConfigMaps
      description: List ConfigMaps for current owner user.
      operationId: listConfigMaps
      tags: [ConfigMaps]
      parameters:
        - name: labelSelector
          in: query
          description: Additional K8s label selector; owner filters are always appended by server.
          schema:
            type: string
      responses:
        "200":
          description: ConfigMap list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIConfigMapListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/open/configmaps/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: ConfigMap name

    get:
      summary: Get ConfigMap
      operationId: getConfigMap
      tags: [ConfigMaps]
      responses:
        "200":
          description: ConfigMap details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIConfigMapDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      summary: Update ConfigMap
      description: Update an existing ConfigMap in place.
      operationId: updateConfigMap
      tags: [ConfigMaps]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIConfigMapRequest"
      responses:
        "200":
          description: ConfigMap updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIConfigMapDetail"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Immutable ConfigMap cannot be updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      summary: Delete ConfigMap
      operationId: deleteConfigMap
      tags: [ConfigMaps]
      responses:
        "200":
          description: ConfigMap deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/open/jobs:
    post:
      summary: Create Job
      description: |
        Create a Job using Genet simplified JSON fields.
        Namespace and system labels are assigned by the server.
      operationId: createJob
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIJobRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIJobResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Job already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      summary: List Jobs
      description: List Jobs for current owner user.
      operationId: listJobs
      tags: [Jobs]
      parameters:
        - name: labelSelector
          in: query
          description: Additional K8s label selector; owner filters are always appended by server.
          schema:
            type: string
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIJobListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/open/jobs/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Job name

    get:
      summary: Get Job
      operationId: getJob
      tags: [Jobs]
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIJobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      summary: Update Job
      description: |
        Update an existing Job using the simplified JSON request body.
        Current behavior is recreate: the old Job is deleted and a new Job is created.
      operationId: updateJob
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIJobRequest"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIJobResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Running job cannot be updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      summary: Delete Job
      operationId: deleteJob
      tags: [Jobs]
      responses:
        "200":
          description: Job deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "API Key from admin page (preferred) or legacy config.yaml openAPI.apiKeys"

  schemas:
    OpenAPIPodCreateRequest:
      type: object
      description: |
        JSON request for creating a Pod.
        Fields are aligned with the web UI "Create Pod" form.
        All resource values keep Kubernetes quantity format (for example `32Gi`, `500m`).
      properties:
        image:
          type: string
          description: Container image (required). Supports full image reference with optional tag.
          example: "nvidia/cuda:12.0.0-base-ubuntu22.04"
        gpuType:
          type: string
          description: GPU type display name. Optional when `gpuCount` is 0.
          example: "NVIDIA A100"
        gpuCount:
          type: integer
          minimum: 0
          maximum: 8
          description: Requested GPU count. `0` means CPU-only pod.
          example: 1
        cpu:
          type: string
          description: CPU request (UI option value, for example `8`).
          example: "8"
        memory:
          type: string
          description: Memory request in Kubernetes quantity format.
          example: "32Gi"
        shmSize:
          type: string
          description: Shared memory size mounted to `/dev/shm`.
          example: "1Gi"
        nodeName:
          type: string
          description: Optional fixed scheduling node.
          example: "gpu-node-01"
        gpuDevices:
          type: array
          description: |
            Optional explicit GPU device indices on selected node.
            When provided, effective GPU count equals `gpuDevices.length`.
          items:
            type: integer
          example: [0, 1]
        name:
          type: string
          description: |
            Optional custom Pod name suffix (for example `train`, `dev`).
            Server generates full name as `pod-{userIdentifier}-{name|timestamp}`.
          example: "train"
        userMounts:
          type: array
          description: Optional custom hostPath mounts (requires admin enabling user mounts).
          items:
            $ref: "#/components/schemas/OpenAPIUserMount"
      required:
        - image
        - gpuCount

    OpenAPIPodUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/OpenAPIPodCreateRequest"
      description: |
        JSON request for Pod update. Current implementation performs recreate.
        Same fields as create request.

    OpenAPIUserMount:
      type: object
      properties:
        hostPath:
          type: string
          description: Host machine path to mount.
          example: "/mnt/datasets"
        mountPath:
          type: string
          description: Container mount path.
          example: "/workspace/datasets"
        readOnly:
          type: boolean
          description: Whether mount is read-only.
          default: false
      required:
        - hostPath
        - mountPath

    OpenAPIPodCreateResponse:
      type: object
      properties:
        message:
          type: string
          description: Creation result message.
          example: "Pod 创建成功"
        id:
          type: string
          description: Pod ID / name.
          example: "pod-alice-train"
        name:
          type: string
          description: Pod name (same as id).
          example: "pod-alice-train"

    OpenAPIPod:
      type: object
      properties:
        id:
          type: string
          description: Pod ID / name.
        name:
          type: string
          description: Pod name.
        namespace:
          type: string
          description: Namespace of this pod.
        container:
          type: string
          description: Main container name.
        status:
          type: string
          description: Normalized status used by UI.
        phase:
          type: string
          description: Raw Kubernetes Pod phase.
        image:
          type: string
          description: Container image.
        gpuType:
          type: string
          description: GPU type label.
        gpuCount:
          type: integer
          description: Requested GPU count.
        cpu:
          type: string
          description: CPU request.
        memory:
          type: string
          description: Memory request.
        createdAt:
          type: string
          format: date-time
          description: Pod creation timestamp.
        nodeIP:
          type: string
          description: Node IP where pod is scheduled.
        protectedUntil:
          type: string
          format: date-time
          nullable: true
          description: Protection deadline if set.

    OpenAPIPodList:
      type: object
      properties:
        pods:
          type: array
          description: Pod list for current owner user.
          items:
            $ref: "#/components/schemas/OpenAPIPod"
        quota:
          $ref: "#/components/schemas/OpenAPIQuota"

    OpenAPIQuota:
      type: object
      properties:
        podUsed:
          type: integer
          description: Used pod count.
        podLimit:
          type: integer
          description: Pod quota limit.
        gpuUsed:
          type: integer
          description: Used GPU count.
        gpuLimit:
          type: integer
          description: GPU quota limit.

    OpenAPIServiceRequest:
      type: object
      properties:
        name:
          type: string
          description: Service name.
          example: "svc-demo"
        type:
          type: string
          description: Service type.
          enum: [ClusterIP, NodePort, LoadBalancer]
          default: ClusterIP
        targetPodName:
          type: string
          description: Optional target Pod name. When provided, server generates selector `app=<targetPodName>`.
        selector:
          type: object
          additionalProperties:
            type: string
          description: Custom selector. Cannot be used together with `targetPodName`.
        ports:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OpenAPIServicePort"
        sessionAffinity:
          type: string
          enum: [None, ClientIP]
          default: None
        publishNotReadyAddresses:
          type: boolean
          default: false
        annotations:
          type: object
          additionalProperties:
            type: string
          description: User annotations. `genet.io/*` is reserved.
      required:
        - name
        - ports

    OpenAPIServicePort:
      type: object
      properties:
        name:
          type: string
          description: Optional port name.
        protocol:
          type: string
          enum: [TCP, UDP, SCTP]
          default: TCP
        port:
          type: integer
          minimum: 1
          maximum: 65535
        targetPort:
          type: string
          description: Integer or named target port.
          example: "8080"
        nodePort:
          type: integer
          minimum: 1
          maximum: 65535
          description: Optional fixed nodePort. Only valid for NodePort services.
      required:
        - port

    OpenAPIServiceResponse:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        type:
          type: string
        selector:
          type: object
          additionalProperties:
            type: string
        ports:
          type: array
          items:
            $ref: "#/components/schemas/OpenAPIServicePort"
        clusterIP:
          type: string
        externalIPs:
          type: array
          items:
            type: string
        loadBalancer:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    OpenAPIServiceListResponse:
      type: object
      properties:
        services:
          type: array
          items:
            $ref: "#/components/schemas/OpenAPIServiceResponse"

    OpenAPIConfigMapRequest:
      type: object
      properties:
        name:
          type: string
          description: ConfigMap name.
        data:
          type: object
          additionalProperties:
            type: string
        binaryData:
          type: object
          additionalProperties:
            type: string
          description: Base64-encoded binary values.
        immutable:
          type: boolean
          default: false
        annotations:
          type: object
          additionalProperties:
            type: string
          description: User annotations. `genet.io/*` is reserved.
      required:
        - name

    OpenAPIConfigMapSummary:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        immutable:
          type: boolean
        dataKeys:
          type: array
          items:
            type: string
        binaryDataKeys:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    OpenAPIConfigMapDetail:
      allOf:
        - $ref: "#/components/schemas/OpenAPIConfigMapSummary"
        - type: object
          properties:
            data:
              type: object
              additionalProperties:
                type: string
            binaryData:
              type: object
              additionalProperties:
                type: string

    OpenAPIConfigMapListResponse:
      type: object
      properties:
        configMaps:
          type: array
          items:
            $ref: "#/components/schemas/OpenAPIConfigMapSummary"

    OpenAPIEnvVar:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
      required:
        - name

    OpenAPIJobRequest:
      type: object
      properties:
        name:
          type: string
          description: Job name.
        image:
          type: string
          description: Container image.
        command:
          type: array
          items:
            type: string
        args:
          type: array
          items:
            type: string
        env:
          type: array
          items:
            $ref: "#/components/schemas/OpenAPIEnvVar"
        workingDir:
          type: string
        gpuType:
          type: string
        gpuCount:
          type: integer
          minimum: 0
          maximum: 8
        cpu:
          type: string
        memory:
          type: string
        shmSize:
          type: string
        nodeName:
          type: string
        gpuDevices:
          type: array
          items:
            type: integer
        userMounts:
          type: array
          items:
            $ref: "#/components/schemas/OpenAPIUserMount"
        parallelism:
          type: integer
          minimum: 0
        completions:
          type: integer
          minimum: 0
        backoffLimit:
          type: integer
          minimum: 0
        ttlSecondsAfterFinished:
          type: integer
          minimum: 0
        restartPolicy:
          type: string
          enum: [Never, OnFailure]
          default: Never
        annotations:
          type: object
          additionalProperties:
            type: string
          description: User annotations. `genet.io/*` is reserved.
      required:
        - name
        - image

    OpenAPIJobResponse:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        image:
          type: string
        parallelism:
          type: integer
        completions:
          type: integer
        active:
          type: integer
        succeeded:
          type: integer
        failed:
          type: integer
        status:
          type: string
          enum: [Pending, Running, Succeeded, Failed]
        createdAt:
          type: string
          format: date-time
        completionTime:
          type: string
          format: date-time
          nullable: true

    OpenAPIJobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/OpenAPIJobResponse"

    Error:
      type: object
      properties:
        error:
          type: string

    Message:
      type: object
      properties:
        message:
          type: string

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Missing or invalid Authorization header"
    Forbidden:
      description: API key lacks required owner binding or scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "forbidden: api key must bind ownerUser"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "resource not found"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
