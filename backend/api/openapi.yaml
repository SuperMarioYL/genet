openapi: "3.0.3"
info:
  title: Genet Open API
  description: |
    Genet OpenAPI for Pod/Job operations.
    - Pod APIs use JSON request/response and align with Create Pod UI capabilities.
    - Job APIs keep YAML request format (K8s native Job spec).
    - Pod APIs require API key bound with `ownerUser` in admin page.
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Local dev

security:
  - BearerAuth: []

paths:
  /api/open/pods:
    post:
      summary: Create Pod
      description: |
        Create a Pod using JSON request fields consistent with the web UI "Create Pod" form.
        The effective namespace is derived from API key bound `ownerUser` (user-{identifier}).
      operationId: createPod
      tags: [Pods]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIPodCreateRequest"
            example:
              image: "nvidia/cuda:12.0.0-base-ubuntu22.04"
              gpuType: "NVIDIA A100"
              gpuCount: 1
              cpu: "8"
              memory: "32Gi"
              shmSize: "1Gi"
              nodeName: "gpu-node-01"
              gpuDevices: [0]
              name: "train"
              userMounts:
                - hostPath: "/mnt/datasets"
                  mountPath: "/workspace/datasets"
                  readOnly: true
      responses:
        "201":
          description: Pod created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIPodCreateResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Conflict (for example active commit job or name conflict)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      summary: List Pods
      description: List Pods for API key bound `ownerUser`.
      operationId: listPods
      tags: [Pods]
      responses:
        "200":
          description: Pod list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIPodList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/open/pods/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Pod ID (same as Pod name)

    get:
      summary: Get Pod
      operationId: getPod
      tags: [Pods]
      responses:
        "200":
          description: Pod details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIPod"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      summary: Update Pod
      description: |
        Update Pod using JSON payload (same fields as create).
        Current behavior is **recreate**: delete old pod, then create a new pod with request fields.
        If `name` is omitted, server tries to infer custom suffix from path `id` and reuse it.
      operationId: updatePod
      tags: [Pods]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAPIPodUpdateRequest"
      responses:
        "201":
          description: Pod recreated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAPIPodCreateResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict (for example active commit job)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      summary: Delete Pod
      operationId: deletePod
      tags: [Pods]
      responses:
        "200":
          description: Pod deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/open/jobs:
    post:
      summary: Create Job
      description: |
        Create a Job in the configured namespace.
        Request body is YAML format (K8s native Job spec).
        Any namespace in request body will be overridden by server.
      operationId: createJob
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/Job"
            example: |
              metadata:
                name: my-job
              spec:
                backoffLimit: 3
                template:
                  spec:
                    containers:
                      - name: worker
                        image: busybox:latest
                        command: ["echo", "hello"]
                    restartPolicy: Never
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Job already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      summary: List Jobs
      description: List all Jobs created via Open API in the configured namespace.
      operationId: listJobs
      tags: [Jobs]
      parameters:
        - name: labelSelector
          in: query
          description: "Additional K8s label selector (genet.io/open-api=true is always appended)"
          schema:
            type: string
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/open/jobs/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Job name

    get:
      summary: Get Job
      operationId: getJob
      tags: [Jobs]
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      summary: Update Job
      description: "Update an existing Job. Request body is YAML. Namespace will be overridden."
      operationId: updateJob
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              $ref: "#/components/schemas/Job"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      summary: Delete Job
      operationId: deleteJob
      tags: [Jobs]
      responses:
        "200":
          description: Job deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "API Key from admin page (preferred) or legacy config.yaml openAPI.apiKeys"

  schemas:
    OpenAPIPodCreateRequest:
      type: object
      description: |
        JSON request for creating a Pod.
        Fields are aligned with the web UI "Create Pod" form.
        All resource values keep Kubernetes quantity format (for example `32Gi`, `500m`).
      properties:
        image:
          type: string
          description: Container image (required). Supports full image reference with optional tag.
          example: "nvidia/cuda:12.0.0-base-ubuntu22.04"
        gpuType:
          type: string
          description: GPU type display name. Optional when `gpuCount` is 0.
          example: "NVIDIA A100"
        gpuCount:
          type: integer
          minimum: 0
          maximum: 8
          description: Requested GPU count. `0` means CPU-only pod.
          example: 1
        cpu:
          type: string
          description: CPU request (UI option value, for example `8`).
          example: "8"
        memory:
          type: string
          description: Memory request in Kubernetes quantity format.
          example: "32Gi"
        shmSize:
          type: string
          description: Shared memory size mounted to `/dev/shm`.
          example: "1Gi"
        nodeName:
          type: string
          description: Optional fixed scheduling node.
          example: "gpu-node-01"
        gpuDevices:
          type: array
          description: |
            Optional explicit GPU device indices on selected node.
            When provided, effective GPU count equals `gpuDevices.length`.
          items:
            type: integer
          example: [0, 1]
        name:
          type: string
          description: |
            Optional custom Pod name suffix (for example `train`, `dev`).
            Server generates full name as `pod-{userIdentifier}-{name|timestamp}`.
          example: "train"
        userMounts:
          type: array
          description: Optional custom hostPath mounts (requires admin enabling user mounts).
          items:
            $ref: "#/components/schemas/OpenAPIUserMount"
      required:
        - image
        - gpuCount

    OpenAPIPodUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/OpenAPIPodCreateRequest"
      description: |
        JSON request for Pod update. Current implementation performs recreate.
        Same fields as create request.

    OpenAPIUserMount:
      type: object
      properties:
        hostPath:
          type: string
          description: Host machine path to mount.
          example: "/mnt/datasets"
        mountPath:
          type: string
          description: Container mount path.
          example: "/workspace/datasets"
        readOnly:
          type: boolean
          description: Whether mount is read-only.
          default: false
      required:
        - hostPath
        - mountPath

    OpenAPIPodCreateResponse:
      type: object
      properties:
        message:
          type: string
          description: Creation result message.
          example: "Pod 创建成功"
        id:
          type: string
          description: Pod ID / name.
          example: "pod-alice-train"
        name:
          type: string
          description: Pod name (same as id).
          example: "pod-alice-train"

    OpenAPIPod:
      type: object
      properties:
        id:
          type: string
          description: Pod ID / name.
        name:
          type: string
          description: Pod name.
        namespace:
          type: string
          description: Namespace of this pod.
        container:
          type: string
          description: Main container name.
        status:
          type: string
          description: Normalized status used by UI.
        phase:
          type: string
          description: Raw Kubernetes Pod phase.
        image:
          type: string
          description: Container image.
        gpuType:
          type: string
          description: GPU type label.
        gpuCount:
          type: integer
          description: Requested GPU count.
        cpu:
          type: string
          description: CPU request.
        memory:
          type: string
          description: Memory request.
        createdAt:
          type: string
          format: date-time
          description: Pod creation timestamp.
        nodeIP:
          type: string
          description: Node IP where pod is scheduled.
        protectedUntil:
          type: string
          format: date-time
          nullable: true
          description: Protection deadline if set.

    OpenAPIPodList:
      type: object
      properties:
        pods:
          type: array
          description: Pod list for current owner user.
          items:
            $ref: "#/components/schemas/OpenAPIPod"
        quota:
          $ref: "#/components/schemas/OpenAPIQuota"

    OpenAPIQuota:
      type: object
      properties:
        podUsed:
          type: integer
          description: Used pod count.
        podLimit:
          type: integer
          description: Pod quota limit.
        gpuUsed:
          type: integer
          description: Used GPU count.
        gpuLimit:
          type: integer
          description: GPU quota limit.

    Job:
      type: object
      description: "Kubernetes Job (batchv1.Job). Namespace field will be ignored and overridden by server."
      properties:
        apiVersion:
          type: string
          example: batch/v1
        kind:
          type: string
          example: Job
        metadata:
          $ref: "#/components/schemas/ObjectMeta"
        spec:
          type: object
          description: "K8s JobSpec - see https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.23/#jobspec-v1-batch"
        status:
          type: object
          description: "K8s JobStatus (read-only, returned by server)"

    JobList:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          example: JobList
        metadata:
          type: object
        items:
          type: array
          items:
            $ref: "#/components/schemas/Job"

    ObjectMeta:
      type: object
      properties:
        name:
          type: string
          description: "Resource name (required for create)"
        namespace:
          type: string
          description: "Will be IGNORED - server always uses configured namespace"
        labels:
          type: object
          additionalProperties:
            type: string
          description: "Labels (genet.io/open-api=true and genet.io/managed=true will be auto-added)"
        annotations:
          type: object
          additionalProperties:
            type: string

    Error:
      type: object
      properties:
        error:
          type: string

    Message:
      type: object
      properties:
        message:
          type: string

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Missing or invalid Authorization header"
    Forbidden:
      description: API key lacks required owner binding or scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "forbidden: api key must bind ownerUser"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "resource not found"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
