apiVersion: v1
kind: ServiceAccount
metadata:
  name: genet-backend
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: genet-backend
rules:
# Helm needs core permissions
- apiGroups: [""]
  resources: ["pods", "services", "serviceaccounts", "namespaces", "persistentvolumes", "persistentvolumeclaims", "resourcequotas", "configmaps", "secrets", "events"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

# Pod logs access
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list", "create"]

# Pod exec/attach/portforward (needed to grant these permissions to users)
- apiGroups: [""]
  resources: ["pods/exec", "pods/attach", "pods/portforward"]
  verbs: ["get", "create"]

# Workload permissions (needed to grant Deployment/StatefulSet permissions to users)
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

# Autoscaling permissions (needed to grant HPA permissions to users)
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

# Ingress permissions (needed to grant Ingress permissions to users)
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

# PDB permissions (needed to grant PodDisruptionBudget permissions to users)
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

# Ray permissions (needed to grant RayCluster permissions to users)
- apiGroups: ["ray.io"]
  resources: ["rayclusters"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

# Events (for monitoring pod status)
- apiGroups: ["events.k8s.io"]
  resources: ["events"]
  verbs: ["get", "list", "watch"]

# Nodes (for getting node IPs)
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]

# Kaniko Jobs (image building)
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]

# RBAC management (for auto-creating user roles)
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

# CSR management (for generating user certificates)
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests/approval"]
  verbs: ["update"]
- apiGroups: ["certificates.k8s.io"]
  resourceNames: ["kubernetes.io/kube-apiserver-client"]
  resources: ["signers"]
  verbs: ["approve"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: genet-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: genet-backend
subjects:
- kind: ServiceAccount
  name: genet-backend
  namespace: {{ .Release.Namespace }}
